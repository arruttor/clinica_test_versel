<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClínicaEdu - Login</title>
    
    <script>
        // Check theme preference before Tailwind loads to prevent flash
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0F172A',
                        darkcard: '#1E293B',
                        primary: '#6366F1',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-100 dark:bg-darkbg text-slate-600 dark:text-slate-300 font-sans h-screen flex items-center justify-center transition-colors duration-300">

    <div class="absolute top-6 right-6">
        <button id="theme-toggle" class="text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-amber-400 transition-colors w-12 h-12 rounded-full flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-800 shadow-md bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
            <i class="ph ph-sun text-2xl hidden" id="theme-toggle-light-icon"></i>
            <i class="ph ph-moon text-2xl hidden" id="theme-toggle-dark-icon"></i>
        </button>
    </div>

    <div class="bg-white dark:bg-darkcard w-full max-w-md p-10 rounded-3xl border border-slate-200 dark:border-slate-700/50 shadow-xl transition-colors duration-300">
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white mb-4 shadow-lg shadow-primary/30">
                <i class="ph ph-stethoscope text-3xl"></i>
            </div>
            <h1 class="text-slate-900 dark:text-white font-bold text-2xl tracking-wide">ClínicaEdu</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 font-medium">Insira suas credenciais para acessar.</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="p-4 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/30 rounded-lg text-center">
                <p class="text-rose-700 dark:text-rose-400 text-sm font-bold">Usuário ou senha incorretos.</p>
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Usuário</label>
                <div class="relative">
                    <i class="ph ph-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 dark:text-slate-500 text-lg"></i>
                    <input type="text" name="username" id="id_username" required
                        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg pl-12 pr-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 dark:focus:border-primary transition font-medium"
                        placeholder="Digite seu identificador">
                </div>
            </div>

            <div>
                <label for="id_password" class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Senha</label>
                <div class="relative">
                    <i class="ph ph-lock-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 dark:text-slate-500 text-lg"></i>
                    <input type="password" name="password" id="id_password" required
                        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg pl-12 pr-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 dark:focus:border-primary transition font-medium"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full mt-6 px-6 py-3.5 rounded-lg bg-primary hover:bg-indigo-600 text-white font-bold text-sm transition shadow-lg shadow-primary/30 flex items-center justify-center gap-2">
                Entrar no Sistema <i class="ph ph-arrow-right font-bold text-lg"></i>
            </button>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>

    <script>
        // Toggle Logic for Login Screen
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
                themeToggleLightIcon.classList.add('hidden');
            }
        }

        updateIcons();

        themeToggleBtn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            
            updateIcons();
        });
    </script>
</body>
</html>
